<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Te amo vida</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="src/output.css" rel="stylesheet">

    <style>
        :root{
            scroll-behavior: smooth;
        }
        body{
            
            overflow: hidden;
            
        }
        div#3{
            overflow: scroll;
        }
        nav a span{
            display: inline-block;
            transition: color 0.3s ;
            transition: transform 0.6s;
        }
        .up{
            transform: translateY(-5px);
        }
        .down{
            transform: translateY(5px);
        }
        nav a:hover .up , nav a:hover .down{
            color: #ffb3d9;
            transform: translateY(0);

        }
        .heart-wrapler .heart{
            
            border-radius: 5rem 5rem 16rem 16rem;
            animation: pulsar infinite alternate-reverse 0.5s;
        }
        
        .heart-wrapler .heart:hover{
            animation: frenetico infinite alternate 0.30s;
        }
        
        @keyframes pulsar{
            from{
                scale: 100%;
            }
            to{
                scale: 125%;
            }
        }
        @keyframes frenetico{
            0%{
                
                scale: 100%;
            }
              75%, 100% {
            scale: 180%;
            opacity: 0.6;
        }
    }

    #declaracao::after{
        content: url(imagens/back.png);
        position: fixed;
        bottom: -1.25rem;
        

    }
    #NPB{    
        transition: rotate 1.7s, scale 1s, border-radius 2.5s ;
    }

    </style>
</head>

<audio autoplay loop>
  <source src="musica-de-fundo.mp3" type="audio/mpeg">
</audio>
